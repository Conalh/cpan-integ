name: ci

on:
  push:
  pull_request:
  workflow_dispatch:   # manual trigger for the live network job

jobs:
  offline-tests:
    # Parsing / lockfile / reconcile logic — no network, no TLS modules needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run offline unit tests
        run: prove -lv t/01-snapshot.t t/02-lockfile.t t/03-reconcile.t t/04-index.t t/05-cpm-resolver.t

  live-tests:
    # pin/verify/tamper against real CPAN — manual only (network + TLS deps).
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Perl TLS support
        run: sudo apt-get update && sudo apt-get install -y libio-socket-ssl-perl libnet-ssleay-perl
      - name: Run live verification
        env:
          CPAN_INTEG_LIVE: 1
        run: prove -lv t/99-live.t

  e2e-install:
    # Prove install-time enforcement end to end: build a verified mirror, then
    # install a module from it with `cpanm --mirror-only` and confirm it loads.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install cpanm and Perl TLS support
        run: sudo apt-get update && sudo apt-get install -y cpanminus libio-socket-ssl-perl libnet-ssleay-perl
      - name: Build a verified mirror from the example snapshot
        run: |
          perl -Ilib bin/cpan-integ pin --snapshot examples/cpanfile.snapshot --out cpanfile.integrity
          perl -Ilib bin/cpan-integ fetch --integrity cpanfile.integrity --snapshot examples/cpanfile.snapshot --cache mirror
      - name: Install Try::Tiny from the verified mirror (offline, --mirror-only)
        run: cpanm --mirror "$PWD/mirror" --mirror-only --notest --local-lib-contained "$PWD/local-lib" Try::Tiny
      - name: Assert the module loads from the verified mirror
        run: perl -I"$PWD/local-lib/lib/perl5" -MTry::Tiny -e 'print "Try::Tiny ", Try::Tiny->VERSION, " installed from verified mirror\n"'

  cpm-integrity:
    # Prove NATIVE install-time enforcement: a patched cpm verifies each
    # downloaded artifact against the cpan-integ lock during its own fetch and
    # aborts before build on a mismatch. Stock cpm performs no artifact
    # verification at all (see integration/cpm/README.md).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install cpanm, Perl TLS support, and App::cpm (for cpm's deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y cpanminus libio-socket-ssl-perl libnet-ssleay-perl
          # Install system-wide so cpm's runtime deps land on the default @INC,
          # where the patched cpm (run from source) can find them.
          sudo cpanm --notest --quiet App::cpm
      - name: Clone cpm at the pinned base and apply the in-fetch verify patch
        run: |
          git clone --quiet https://github.com/skaji/cpm /tmp/cpmsrc
          git -C /tmp/cpmsrc checkout --quiet "$(cat integration/cpm/BASE_COMMIT)"
          git -C /tmp/cpmsrc apply "$PWD/integration/cpm/in-fetch-verify.patch"
          echo "patched cpm at $(git -C /tmp/cpmsrc rev-parse --short HEAD) + in-fetch verification"
      - name: Build a verified mirror + lock from the example snapshot
        run: |
          perl -Ilib bin/cpan-integ pin --snapshot examples/cpanfile.snapshot --out cpanfile.integrity
          perl -Ilib bin/cpan-integ fetch --integrity cpanfile.integrity --snapshot examples/cpanfile.snapshot --cache mirror
      - name: "POSITIVE: patched cpm installs Try::Tiny and logs a verified digest"
        run: |
          perl -I/tmp/cpmsrc/lib -I"$PWD/lib" /tmp/cpmsrc/script/cpm install -v \
            --mirror "file://$PWD/mirror" --mirror-only \
            --resolver "+App::CpanInteg::CpmResolver,snapshot=$PWD/examples/cpanfile.snapshot,integrity=$PWD/cpanfile.integrity,mirror=file://$PWD/mirror" \
            --local-lib-contained "$PWD/local-pos" \
            Try::Tiny 2>&1 | tee pos.log
          grep -rq "Verified sha256:" pos.log "$HOME/.perl-cpm" 2>/dev/null \
            || { echo "FAIL: expected a 'Verified sha256:' line from the patched fetch"; exit 1; }
          perl -I"$PWD/local-pos/lib/perl5" -MTry::Tiny -e 'print "OK: Try::Tiny ", Try::Tiny->VERSION, " installed (verified)\n"'
      - name: "TAMPER: corrupt the mirrored artifact; patched cpm must abort pre-build"
        run: |
          # Overwrite the verified tarball bytes. The lock (and the resolver that
          # reads it) still carry the ORIGINAL SHA-256, so the bytes no longer
          # match the pin -- exactly the drift/tamper this is meant to catch.
          tarball=$(find "$PWD/mirror/authors/id" -name 'Try-Tiny-*.tar.gz')
          echo "tampered bytes that no longer match the pinned digest" > "$tarball"
          rm -rf "$HOME/.perl-cpm"   # ensure a fresh fetch, not a cached good copy
          set +e
          perl -I/tmp/cpmsrc/lib -I"$PWD/lib" /tmp/cpmsrc/script/cpm install -v \
            --mirror "file://$PWD/mirror" --mirror-only \
            --resolver "+App::CpanInteg::CpmResolver,snapshot=$PWD/examples/cpanfile.snapshot,integrity=$PWD/cpanfile.integrity,mirror=file://$PWD/mirror" \
            --local-lib-contained "$PWD/local-neg" \
            Try::Tiny 2>&1 | tee neg.log
          rc=${PIPESTATUS[0]}
          set -e
          test "$rc" -ne 0 \
            || { echo "FAIL: patched cpm should have exited non-zero on the tampered artifact"; exit 1; }
          grep -rq "Checksum MISMATCH" neg.log "$HOME/.perl-cpm" 2>/dev/null \
            || { echo "FAIL: expected a 'Checksum MISMATCH' abort in the log"; exit 1; }
          if perl -I"$PWD/local-neg/lib/perl5" -MTry::Tiny -e1 2>/dev/null; then
            echo "FAIL: Try::Tiny was installed despite the tampered artifact"; exit 1
          fi
          echo "OK: patched cpm aborted on the tampered artifact, before build, and installed nothing"
